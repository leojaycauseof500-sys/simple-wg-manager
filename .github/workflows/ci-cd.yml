name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # 允许手动触发

env:
  # 部署相关环境变量
  JAR_NAME: "simple-wg-ad-${{ github.run_number }}.jar"
  DEPLOY_DIR: "/opt/simple-wg-manager"
  SERVICE_NAME: "simple-wg-manager"
  
  # GitHub Pages相关
  PAGES_BRANCH: "gh-pages"
  PAGES_DIR: "public"

jobs:
  # 构建和测试阶段
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4.0.0
    
    - name: Build with Gradle
      run: ./gradlew build
    
    - name: Run tests
      run: ./gradlew test
    
    - name: Generate JaCoCo report
      run: ./gradlew jacocoTestReport
    
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: application-jar
        path: build/libs/simple-wg-ad-*.jar
        retention-days: 7
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          build/test-results/
          build/reports/tests/
        retention-days: 7
    
    - name: Upload JaCoCo report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: jacoco-report
        path: build/reports/jacoco/
        retention-days: 7

  # GitHub Pages部署阶段
  deploy-to-github-pages:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    
    # 设置GitHub Pages环境
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Pages
      uses: actions/configure-pages@v5
    
    - name: Prepare GitHub Pages content
      run: |
        mkdir -p ${{ env.PAGES_DIR }}
        # 复制静态文件
        cp -r ./src/main/resources/static/* ${{ env.PAGES_DIR }}/
        # 复制测试报告
        mkdir -p ${{ env.PAGES_DIR }}/reports
        cp -r build/reports/jacoco/jacocoTestReport/html/* ${{ env.PAGES_DIR }}/reports/
        # 创建索引页面
        cat > ${{ env.PAGES_DIR }}/index.html << 'EOF'
        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Simple WireGuard Manager - Reports</title>
            <style>
                body { font-family: Arial, sans-serif; margin: 40px; }
                h1 { color: #333; }
                .card { border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin: 20px 0; }
                .card h2 { margin-top: 0; }
                .btn { display: inline-block; padding: 10px 20px; background: #007bff; color: white; text-decoration: none; border-radius: 4px; }
                .btn:hover { background: #0056b3; }
            </style>
        </head>
        <body>
            <h1>Simple WireGuard Manager</h1>
            <div class="card">
                <h2>Test Coverage Report</h2>
                <p>View the JaCoCo test coverage report:</p>
                <a href="./reports/index.html" class="btn">View Coverage Report</a>
            </div>
            <div class="card">
                <h2>Application</h2>
                <p>The main application is deployed separately.</p>
                <p>Build Number: ${{ github.run_number }}</p>
                <p>Commit: <a href="https://github.com/${{ github.repository }}/commit/${{ github.sha }}">${{ github.sha }}</a></p>
            </div>
        </body>
        </html>
        EOF
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  # 服务器部署阶段
  deploy-to-server:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
    - name: Download JAR artifact
      uses: actions/download-artifact@v4
      with:
        name: application-jar
    
    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
    
    - name: Create deployment script
      run: |
        cat > deploy.sh << 'EOF'
        #!/bin/bash
        set -e
        
        SERVER_HOST="${{ secrets.SERVER_HOST }}"
        SERVER_USER="${{ secrets.SERVER_USERNAME }}"
        DEPLOY_DIR="${{ env.DEPLOY_DIR }}"
        JAR_NAME="${{ env.JAR_NAME }}"
        SERVICE_NAME="${{ env.SERVICE_NAME }}"
        
        echo "Starting deployment to $SERVER_HOST..."
        
        # 上传JAR文件
        echo "Uploading JAR file..."
        scp simple-wg-ad-*.jar $SERVER_USER@$SERVER_HOST:$DEPLOY_DIR/$JAR_NAME
        
        # 在服务器上执行部署命令
        echo "Executing deployment commands on server..."
        ssh $SERVER_USER@$SERVER_HOST << 'SSH_EOF'
        set -e
        
        DEPLOY_DIR="${{ env.DEPLOY_DIR }}"
        JAR_NAME="${{ env.JAR_NAME }}"
        SERVICE_NAME="${{ env.SERVICE_NAME }}"
        PRIVATE_KEY="${{ secrets.SERVER_PRIVATE_KEY }}"
        
        echo "Creating deployment directory if not exists..."
        sudo mkdir -p $DEPLOY_DIR
        sudo chown $USER:$USER $DEPLOY_DIR
        
        echo "Creating backup of current JAR..."
        if [ -f "$DEPLOY_DIR/simple-wg-ad.jar" ]; then
          cp $DEPLOY_DIR/simple-wg-ad.jar $DEPLOY_DIR/simple-wg-ad.jar.backup.$(date +%Y%m%d%H%M%S)
        fi
        
        echo "Updating JAR file..."
        mv $DEPLOY_DIR/$JAR_NAME $DEPLOY_DIR/simple-wg-ad.jar
        
        # 使用项目中的run.sh脚本创建启动命令
        echo "Creating systemd service using project run.sh..."
        sudo tee /etc/systemd/system/$SERVICE_NAME.service > /dev/null << SERVICE_EOF
        [Unit]
        Description=Simple WireGuard Manager
        After=network.target
        
        [Service]
        Type=simple
        User=$USER
        WorkingDirectory=$DEPLOY_DIR
        # 使用run.sh脚本启动，传递私钥作为参数
        ExecStart=$DEPLOY_DIR/run.sh prod -Dwg-manager.default.server-private-key="$PRIVATE_KEY"
        Restart=on-failure
        RestartSec=10
        
        [Install]
        WantedBy=multi-user.target
        SERVICE_EOF
        
        # 上传run.sh脚本到服务器
        echo "Uploading run.sh script..."
        SSH_EOF
        
        # 上传run.sh脚本
        scp ../../run.sh $SERVER_USER@$SERVER_HOST:$DEPLOY_DIR/
        ssh $SERVER_USER@$SERVER_HOST "chmod +x $DEPLOY_DIR/run.sh"
        
        # 继续执行部署命令
        ssh $SERVER_USER@$SERVER_HOST << 'SSH_EOF2'
        DEPLOY_DIR="${{ env.DEPLOY_DIR }}"
        SERVICE_NAME="${{ env.SERVICE_NAME }}"
        
        # 重新加载systemd并重启服务
        echo "Reloading systemd and restarting service..."
        sudo systemctl daemon-reload
        sudo systemctl enable $SERVICE_NAME
        sudo systemctl restart $SERVICE_NAME
        
        echo "Checking service status..."
        sudo systemctl status $SERVICE_NAME --no-pager
        
        echo "Deployment completed successfully!"
        SSH_EOF2
        EOF
        
        chmod +x deploy.sh
    
    - name: Execute deployment
      run: ./deploy.sh
    
    - name: Cleanup SSH key
      run: |
        rm -f ~/.ssh/id_rsa
        rm -f ~/.ssh/known_hosts

  # 依赖提交阶段
  dependency-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@v4.0.0