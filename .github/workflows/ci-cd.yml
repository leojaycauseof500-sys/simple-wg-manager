name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # 允许手动触发

env:
  # 部署相关环境变量
  JAR_NAME: "simple-wg-ad-${{ github.run_number }}.jar"
  DEPLOY_DIR: "/opt/simple-wg-manager"
  SERVICE_NAME: "simple-wg-manager"
  
  # GitHub Pages相关
  PAGES_BRANCH: "gh-pages"
  PAGES_DIR: "public"

  VERSION: "0.0.1-SNAPSHOT"
jobs:
  # 构建和测试阶段
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4.0.0
    
    - name: Build with Gradle
      run: ./gradlew build

    - name: Prepare GitHub Pages content
      run: |
        mkdir -p ${{ env.PAGES_DIR }}
        # 复制静态文件
        mkdir -p ${{env.PAGES_DIR}}/static
        cp -r ./src/main/resources/static/* ${{ env.PAGES_DIR }}/static/

        mkdir -p ${{ env.PAGES_DIR }}/reports
        cp -r build/jacocoHtml/* ${{ env.PAGES_DIR }}/reports/

        cat > ${{ env.PAGES_DIR }}/index.html << 'EOF'
        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Simple WireGuard Manager - Reports</title>
            <style>
                body { font-family: Arial, sans-serif; margin: 40px; }
                h1 { color: #333; }
                .card { border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin: 20px 0; }
                .card h2 { margin-top: 0; }
                .btn { display: inline-block; padding: 10px 20px; background: #007bff; color: white; text-decoration: none; border-radius: 4px; }
                .btn:hover { background: #0056b3; }
            </style>
        </head>
        <body>
            <h1>Simple WireGuard Manager</h1>
            <div class="card">
                <h2>Test Coverage Report</h2>
                <p>View the JaCoCo test coverage report:</p>
                <a href="./reports/index.html" class="btn">View Coverage Report</a>
            </div>
            <div class="card">
                <h2>Static Page</h2>
                <a href="./static/index.html" class="btn">View Coverage Report</a>
        </body>
        </html>
        EOF
        
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'public/'
        
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: application-jar
        path: build/libs/simple-wg-ad-*.jar
        retention-days: 7

  # GitHub Pages部署阶段
  deploy-to-github-pages:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    
    # 设置GitHub Pages环境
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  # 服务器部署阶段
  deploy-to-server:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
    - name: Download JAR artifact
      uses: actions/download-artifact@v4
      with:
        name: application-jar
    
    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy Jar to Server
      run: |
        ssh ${{secrets.SERVER_USERNAME}}@${{secrets.SERVER_HOST}} "mkdir -p ${{env.DEPLOY_DIR}}"
        scp simple-wg-ad-*.jar ${{secrets.SERVER_USERNAME}}@${{secrets.SERVER_HOST}}:${{env.DEPLOY_DIR}}
        
    - name: Run Jar
      run: |
        ssh ${{secrets.SERVER_USERNAME}}@${{secrets.SERVER_HOST}} "java -jar 
        ${{env.DEPLOY_DIR}}/simple-wg-ad-${{env.VERSION.jar}} 
        --spring.profiles.active=prod 
        --wg-manager.default.server-private-key=${{secrets.SERVER_PRIVATE_KEY}}"
        
    - name: Cleanup SSH key
      run: |
        rm -f ~/.ssh/id_rsa
        rm -f ~/.ssh/known_hosts

  # 依赖提交阶段
  dependency-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@v4.0.0
